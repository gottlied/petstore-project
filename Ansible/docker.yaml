- name: Build and Deploy Petstore
  hosts: local
  become: yes
  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes

    - name: Log in to Docker Hub
      community.docker.docker_login:
        registry_url: https://index.docker.io/v1/
        username: "divyabharathi99"
        password: "dckr_pat_jX4xdHPP1bMjkjp2_KnNCzHo7dg
"

    - name: Build and Push Docker image
      community.docker.docker_image:
        name: "divyabharathi99/petstore"
        tag: latest
        build:
          path: /var/lib/jenkins/workspace/petstore-project
        push: yes
        source: build

    - name: Run Petstore container
      community.docker.docker_container:
        name: pet1
        image: "divyabharathi99/petstore:latest"
        state: started
        restart_policy: always
        published_ports:
          - "8090:8080"
